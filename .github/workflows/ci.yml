name: CI

# Run on every push to main and on EVERY pull request regardless of target
# branch. The project ships as a stack of dependent PRs (phase-1 -> phase-2 ->
# ...), so PRs frequently target another phase branch rather than `main`; an
# unfiltered `pull_request` trigger ensures each stacked PR is actually checked.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format (ruff). Fast, no services needed.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install ruff at the version pinned by the dev extra so local and CI ruff
      # agree (a newer ruff can introduce rules that fail CI but pass locally).
      - run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src/ tests/
      - name: ruff format --check
        run: ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Static type check (mypy).
  #
  # ADVISORY (continue-on-error): the codebase carries a pre-existing untyped
  # backlog (~33 errors: implicit-Optional, repo override mismatches, str-vs-UUID
  # at the DB-repo boundary). Tightening these is tracked as future work and must
  # not block PRs today, so the job reports type errors without failing CI.
  # ---------------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[api,worker,s3,dev,test]"
      - name: mypy (advisory)
        run: mypy src/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Unit + integration tests with coverage.
  #
  # Services:
  #   * postgres:16  -> the harness creates a dedicated `genai_platform_test` DB
  #                     on this server and runs `alembic upgrade head` against it.
  #   * redis:7      -> cache / JWT denylist / rate-limit.
  #   * MinIO        -> real S3-compatible backend for the `TestBackendDownload`
  #                     (S3/MinIO 307-presigned) e2e case.
  #
  # MinIO is NOT declared as a GitHub `services:` container. A service container
  # cannot override the image's entrypoint/command, but the MinIO image needs
  # `server /data` as its command — so it would just crash-loop as a service.
  # Instead we `docker run -d` it ourselves (full command control), poll its
  # /minio/health/ready endpoint, and create the `genai-assets` bucket with the
  # `minio/mc` client container. This is the clean, documented workaround.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genai_platform
          POSTGRES_USER: genai
          POSTGRES_PASSWORD: genai_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U genai -d genai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # --- DB / cache ---------------------------------------------------------
      DATABASE_URL: postgresql+asyncpg://genai:genai_dev@localhost:5432/genai_platform
      REDIS_URL: redis://localhost:6379/0
      # --- S3 / MinIO ---------------------------------------------------------
      # storage_s3.py reads S3_* for bucket/region/endpoint but authenticates via
      # the standard boto3 credential chain, so AWS_ACCESS_KEY_ID /
      # AWS_SECRET_ACCESS_KEY MUST be set (see docs/FOUND_ISSUES.md).
      STORAGE_BACKEND: s3
      S3_BUCKET: genai-assets
      S3_ENDPOINT_URL: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      # --- App ----------------------------------------------------------------
      DEFAULT_IMAGE_BACKEND: firefly
      # Cookie tests run over plain HTTP (no TLS in CI), so Secure cookies would
      # be dropped; disable the Secure flag for the test run.
      COOKIE_SECURE: "false"
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # P4-T3 renders text with PIL and asserts a real FreeTypeFont is loaded; on
      # Linux that requires actual TrueType fonts (DejaVu), else PIL falls back to
      # a bitmap font and those assertions fail.
      - name: Install OS dependencies (fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"

      - name: Wait for MinIO and create the genai-assets bucket
        run: |
          # Poll the MinIO readiness probe (not just TCP) before provisioning.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            echo "waiting for MinIO ($i/30)..."
            sleep 2
          done
          # Create the bucket idempotently with the mc client (its own container,
          # joined to the host network so it can reach 127.0.0.1:9000).
          docker run --rm --network host --entrypoint sh minio/mc -c '
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/genai-assets
          '

      - name: Install dependencies
        run: pip install -e ".[api,worker,s3,dev,test]"

      # Generate a throwaway SECRET_KEY for this run (>=32 chars). Never reuse a
      # committed/dev secret in CI.
      - name: Generate throwaway SECRET_KEY
        run: echo "SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" >> "$GITHUB_ENV"

      # Migrations are the schema source of truth (no Base.metadata.create_all);
      # apply them against the CI Postgres so the real migration path is exercised.
      - name: Apply database migrations
        run: alembic upgrade head

      # Run unit + integration tests with coverage. Paid-tier tests are excluded
      # two ways (belt and suspenders): the `-m "not paid"` marker filter AND the
      # P6-T1 RUN_PAID_TESTS gate (unset here, so any `paid` test self-skips). The
      # `integration` e2e tests (Postgres/Redis/MinIO) DO run. The 78% floor sits
      # ~3.7pts below the measured 81.7% total so CI guards regressions without
      # flaking on small platform variance.
      - name: Run tests with coverage
        run: |
          pytest -m "not paid" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=78

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Stop MinIO
        if: always()
        run: docker rm -f minio || true

  # ---------------------------------------------------------------------------
  # Security lint (bandit) over the source tree.
  # ---------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r src/ -ll -q

  # ---------------------------------------------------------------------------
  # Frontend build (only if a frontend exists).
  # ---------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # hashFiles() is not allowed in a job-level `if:`, so detect the frontend
      # at the step level and gate the remaining steps on the result. This keeps
      # the job a no-op when `frontend/package.json` is absent.
      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci
      - name: npm run build
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run build
