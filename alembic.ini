# Alembic Configuration File
# Creative Automation Pipeline

[alembic]
# path to migration scripts.
# Use forward slashes (/) also on Windows to provide OS agnostic paths.
script_location = src/db/migrations

# sys.path prepend - ensures project root is importable
prepend_sys_path = .

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python>=3.9 or backports.zoneinfo library.
# Any required timezone provider is installed from pip with:
# pip install tzdata
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .hierarchical_merge_point based migration files
# to be created if the target directory already has multiple heads.
# merge_point_per_head = false

# set to 'true' to detect type changes. Note that this requires
# the sqlalchemy-utils package to be installed.
# compare_type = true

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
