# Docker Compose - Local Development Services
# Creative Automation Pipeline
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes (reset data)

services:
  postgres:
    image: postgres:16
    container_name: genai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: genai_platform
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai_dev
    ports:
      # Host port remapped 5432 -> 5434 to avoid colliding with another local
      # stack already bound to host :5432 (see docs/FOUND_ISSUES.md). The
      # container still listens on 5432 internally; connect from the host via
      # localhost:5434.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genai -d genai_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genai-redis
    restart: unless-stopped
    ports:
      # Host port remapped 6379 -> 6380 (host :6379 already in use locally).
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: genai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      # Host ports remapped 9000/9001 -> 9002/9003 (host :9000-9001 already in
      # use locally). S3 API on localhost:9002, console on localhost:9003.
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot init: create the assets bucket once MinIO is healthy, then exit.
  # Idempotent — re-running `docker compose up -d` is safe.
  minio-init:
    image: minio/mc:latest
    container_name: genai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/genai-assets &&
      echo 'bucket genai-assets ready'
      "

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local
